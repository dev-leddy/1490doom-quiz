<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Doom Company Are You? | 1490 DOOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Caslon Antique';
  src: url('fonts/CaslonAntique-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Caslon Antique';
  src: url('fonts/CaslonAntique-Bold.ttf') format('truetype');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Caslon Antique';
  src: url('fonts/CaslonAntique-Italic.ttf') format('truetype');
  font-weight: 400;
  font-style: italic;
  font-display: swap;
}
@font-face {
  font-family: 'Caslon Antique';
  src: url('fonts/CaslonAntique-BoldItalic.ttf') format('truetype');
  font-weight: 700;
  font-style: italic;
  font-display: swap;
}
</style>
<style>
/* ─── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white:    #ffffff;
  --muted:    #c9c5c3;
  --red:      #be4127;
  --red-glow: rgba(190,65,39,0.35);
  --black:    #080808;
  --surface:  rgba(255,255,255,0.05);
  --border:   rgba(255,255,255,0.11);

  --font-blackletter: 'Caslon Antique', 'Palatino Linotype', Georgia, serif;
  --font-display: 'Cinzel', serif;
  --font-heading: 'Lora', serif;
  --font-body:    'Crimson Text', Georgia, serif;

  --company-accent:     #be4127;
  --company-accent-rgb: 190,65,39;
  --speed: 400ms;
  --max-w: 680px;
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 18px;
  line-height: 1.6;
  overflow: hidden;
}

/* ─── Background System ─────────────────────────────────────────── */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: var(--black);
  overflow: hidden;
}

/* Two art slots for crossfade */
.bg-art {
  position: absolute;
  inset: 0;
  background-color: #be4127;
  background-size: cover;
  background-position: center 35%;
  background-repeat: no-repeat;
  opacity: 0;
  transition: opacity 700ms ease;
  z-index: 0;
}
.bg-art.active { opacity: 1; }

/* Dark overlay */
.bg-cover {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: rgba(4, 2, 1, 0.72);
  transition: background 700ms ease;
}
.bg-cover.bg-cover-result { background: rgba(4, 2, 1, 0.88); }

/* ─── Bottom Fog ────────────────────────────────────────────────── */
.fog-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 33vh;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
  filter: blur(2px) saturate(1.1) sepia(0.15);
  mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.6) 40%, black 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.6) 40%, black 100%);
  opacity: 1;
  transition: opacity 600ms ease;
}
/* Hero: visible but halved opacity */
.fog-bottom.fog-hero { opacity: 0.4; }
/* Quiz: full opacity (default) */
.fog-bottom.fog-quiz  { opacity: 1; }
/* Result: no page fog — fog lives inside each warrior card */
.fog-bottom.fog-result { opacity: 0; pointer-events: none; }

/* Result tower */
.fog-bottom .fog-layer {
  position: absolute;
  width: 200%;
  height: 100%;
  left: 0;
  top: 0;
}
.fog-bottom .fog-layer .fog-img {
  float: left;
  width: 50%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.fog-layer-1 { animation: fogMove 22s linear infinite; }
.fog-layer-2 { animation: fogOpacity2 18s linear infinite, fogMove 16s linear infinite reverse; opacity: 0.6; }

.fog-layer-1 .fog-img {
  background-image: url("https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png");
}
.fog-layer-2 .fog-img {
  background-image: url("https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog2.png");
}

@keyframes fogMove {
  0%   { left: 0; }
  100% { left: -100%; }
}
@keyframes fogOpacity2 {
  0%   { opacity: 0.3; }
  40%  { opacity: 0.6; }
  70%  { opacity: 0.2; }
  100% { opacity: 0.3; }
}

@media (prefers-reduced-motion: reduce) {
  .fog-bottom { display: none; }
  .bg-art, .quiz-section, #question-container { transition: none !important; }
}

/* ─── App & Sections ────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 1;
  height: 100vh;
  overflow: hidden;
}

.quiz-section {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 2rem;
  opacity: 0;
  transform: translateY(14px);
  pointer-events: none;
  transition: opacity var(--speed) ease, transform var(--speed) ease;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.quiz-section.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
#section-hero.active { cursor: pointer; }

/* ─── Divider ───────────────────────────────────────────────────── */
.doom-divider {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  width: 100%;
  margin: 0.15rem 0;
}
.doom-divider::before,
.doom-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.11);
}
.doom-divider span { font-size: 0.6rem; opacity: 0.3; }

/* ─── Buttons ───────────────────────────────────────────────────── */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 54px;
  padding: 0.9rem 2.8rem;
  background: var(--red);
  color: var(--white);
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-decoration: none;
  border: none;
  cursor: pointer;
  border-radius: 2px;
  transition: background 180ms, transform 100ms;
}
.btn-primary:hover, .btn-primary:focus-visible {
  background: #cc4e30;
  outline: none;
}
.btn-primary:active { transform: scale(0.98); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 0.7rem 1.8rem;
  background: transparent;
  color: var(--muted);
  font-family: var(--font-display);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  border-radius: 2px;
  transition: border-color 180ms, color 180ms;
}
.btn-ghost:hover, .btn-ghost:focus-visible {
  border-color: rgba(255,255,255,0.45);
  color: var(--white);
  outline: none;
}

button, a {
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
button:focus-visible, a:focus-visible {
  outline: 2px solid var(--red);
  outline-offset: 3px;
}

/* ─── HERO ──────────────────────────────────────────────────────── */
.hero-content {
  max-width: 560px;
  width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.1rem;
}

.hero-logo {
  width: clamp(260px, 55vw, 400px);
  height: auto;
  animation: fadeUp 0.9s ease both;
}

.hero-tagline {
  font-family: var(--font-display);
  font-size: clamp(0.62rem, 1.5vw, 0.8rem);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  animation: fadeUp 0.9s 0.15s ease both;
}

.hero-description {
  font-family: var(--font-heading);
  font-style: italic;
  font-size: clamp(1rem, 2.2vw, 1.2rem);
  color: rgba(255,255,255,0.7);
  max-width: 460px;
  line-height: 1.8;
  animation: fadeUp 0.9s 0.3s ease both;
}

.hero-cta { animation: fadeUp 0.9s 0.45s ease both; margin-top: 0.4rem; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── QUIZ ──────────────────────────────────────────────────────── */
.quiz-wrapper {
  position: relative;
  max-width: var(--max-w);
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* Progress header — anchored just above the question container */
.quiz-header {
  position: absolute;
  bottom: 100%;
  left: 0;
  right: 0;
  padding-bottom: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* Progress */
.btn-back {
  position: absolute;
  top: 4.5rem; /* clears the 42px audio widget at top: 1.25rem */
  left: 2rem;
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--font-display);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0.3rem 0;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  transition: color 150ms;
  visibility: hidden;
  white-space: nowrap;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  z-index: 2;
}
.btn-back:hover { color: var(--white); }
.btn-back.visible { visibility: visible; }

.progress-area { display: flex; flex-direction: column; gap: 0.55rem; }

.progress-label {
  font-family: var(--font-display);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
}

.progress-dots { display: flex; gap: 0.5rem; }

.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  transition: background 300ms, border-color 300ms, transform 200ms;
}
.dot.completed { background: var(--red); border-color: var(--red); }
.dot.current   { background: rgba(190,65,39,0.5); border-color: var(--red); transform: scale(1.2); }

/* Question */
#question-container {
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
  transition: opacity 200ms ease;
}
#question-container.fading { opacity: 0; }

.question-text {
  font-family: var(--font-heading);
  font-size: clamp(1.1rem, 2.6vw, 1.45rem);
  font-weight: 600;
  color: var(--white);
  line-height: 1.45;
  text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 1px 3px rgba(0,0,0,0.95);
}

.answers-grid { display: flex; flex-direction: column; gap: 0.6rem; }

.answer-btn {
  min-height: 56px;
  padding: 0.95rem 1.25rem;
  background: rgba(4,4,4,0.92);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.88);
  font-family: var(--font-body);
  font-size: clamp(0.95rem, 2vw, 1.08rem);
  line-height: 1.45;
  text-align: left;
  cursor: pointer;
  border-radius: 2px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  transition: background 160ms, border-color 160ms, transform 80ms;
  -webkit-tap-highlight-color: transparent;
}
.answer-btn:hover, .answer-btn:focus-visible {
  background: rgba(190,65,39,0.18);
  border-color: rgba(190,65,39,0.55);
  color: var(--white);
  outline: none;
}
.answer-btn:active { transform: scale(0.99); }
.answer-btn:disabled { cursor: default; pointer-events: none; }

/* ─── RESULT ────────────────────────────────────────────────────── */
#section-result {
  padding: 0;
  bottom: 0; /* fills full viewport — footer z-index:20 overlaps cleanly */
  overflow: hidden; /* always hidden so ::before/::after never scroll away */
  align-items: stretch;
  justify-content: flex-start;
  /* Full battlefield atmosphere */
  background-color: #be4127;
  background-image: url('Art/Bonus%20Art/Battlefield.png');
  background-size: cover;
  background-position: center 35%;
}
/* Scroll lives here — section stays still so fog/overlay never drift */
.result-scroll-inner {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 1.5rem 2rem 6.5rem; /* bottom clears the footer */
  box-sizing: border-box;
}
#section-result::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(4,2,1,0.91) 0%, rgba(4,2,1,0.95) 60%, rgba(4,2,1,0.98) 100%);
  pointer-events: none;
  z-index: 0;
}
#section-result::after {
  content: '';
  position: absolute;
  inset: 0;
  background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png')
    repeat-x center bottom / 200% auto;
  opacity: 0.5;
  animation: cardFog1 20s linear infinite;
  pointer-events: none;
  z-index: 1;
}

.result-wrapper {
  max-width: 960px;
  width: 100%;
  /* no fixed height — lets auto margins do vertical centering */
  margin: auto 0; /* top/bottom: auto = centers vertically when there's free space */
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.65rem;
  text-align: center;
}

/* ── Rep + name + tagline row ── */
.result-hero-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.45rem;
  width: 100%;
  text-align: center;
  flex-shrink: 0;
}

.result-name-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
}

.result-eyebrow {
  font-family: var(--font-display);
  font-size: 0.62rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--muted);
}

.result-name {
  font-family: var(--font-blackletter);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  color: var(--company-accent);
  letter-spacing: 0.04em;
  line-height: 1.0;
  transition: color var(--speed);
}

.result-rep-wrap {
  width: 110px;
  height: 110px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(var(--company-accent-rgb), 0.12);
  border: 2px solid rgba(var(--company-accent-rgb), 0.35);
  border-radius: 50%;
  padding: 0.75rem;
  transition: background var(--speed), border-color var(--speed);
}
.result-rep-wrap img { width: 100%; height: 100%; object-fit: contain; }

.result-tagline {
  font-family: var(--font-heading);
  font-size: 0.95rem;
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
  margin-top: 0.2rem;
}

/* ── Middle row: ability card + warriors side-by-side ── */
.result-main-row {
  display: flex;
  flex-direction: row;
  flex: 1;
  min-height: 0;
  gap: 0.65rem;
  width: 100%;
  align-items: stretch;
}

/* ── Two-column body ── */
.result-ability-card {
  flex: 0 0 34%;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.result-bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.65rem;
  width: 100%;
  flex-shrink: 0;
}

/* ── Warriors section ── */
.result-warriors-section {
  display: flex;
  flex-direction: column;
  gap: 0;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  /* Glass panel — matches result-card treatment */
  background: rgba(6,3,1,0.55);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.result-warriors-section .warrior-list {
  flex-direction: row;
  flex: 1;
  min-height: 0;
  gap: 0;
  padding: 0.75rem 0 0;
  background: transparent;
}
.section-label {
  font-family: var(--font-display);
  font-size: 0.6rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--muted);
}
.warrior-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  width: 100%;
  flex: 1;
}
.warrior-card {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: transparent;
  overflow: visible;
  backdrop-filter: none;
  position: relative;
  z-index: 4;
}

/* Per-card layers all hidden — container handles bg, gradient, fog */
.warrior-mini-card .card-tower,
.warrior-mini-card .card-dark,
.warrior-mini-card .card-fog-1,
.warrior-mini-card .card-fog-2 { display: none; }
.warrior-mini-card {
  width: 100%;
  flex: 1;
  min-height: 0;
  background: transparent !important;
  flex-shrink: 0;
  position: relative;
  overflow: visible;
}
.warrior-mini-card > div {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
@keyframes cardFog1 {
  from { background-position: 0% bottom; }
  to   { background-position: 200% bottom; }
}
@keyframes cardFog2 {
  from { background-position: 200% bottom; }
  to   { background-position: 0% bottom; }
}
.warrior-mini-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(to bottom, transparent 0%, rgba(4,2,1,0.65) 100%);
  pointer-events: none;
  z-index: 5;
}
.warrior-mini-card img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center 60%;
  display: block;
  z-index: 4;
}
.warrior-card-text {
  padding: 0.4rem 0.3rem 0.65rem;
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
  text-align: center;
  position: relative;
  z-index: 6;
  overflow: hidden;
  background: rgba(4,2,1,0.45);
}
.warrior-row-name {
  font-family: var(--font-heading);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--white);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.warrior-row-title {
  font-family: var(--font-blackletter);
  font-size: 1.5rem;
  color: var(--white);
  line-height: 1.1;
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.warrior-row-desc {
  font-family: var(--font-heading);
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.6;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Shared result card style ── */
.result-card {
  width: 100%;
  background: rgba(6,3,1,0.6);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
  backdrop-filter: blur(4px);
  text-align: left;
}
.result-card-header {
  background: #be4127;
  padding: 0.45rem 0.85rem;
  text-align: left;
}
.result-card-header-label {
  font-family: var(--font-blackletter);
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.95);
}
.result-card-body {
  padding: 0.85rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.3rem;
  flex: 1;
  min-height: 0;
}

/* ── Company ability ── */
.result-ability-body {
  flex-direction: column !important;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  flex: 1;
  text-align: center;
}
.mark-logo {
  width: 80px;
  height: 80px;
  object-fit: contain;
  flex-shrink: 0;
  opacity: 0.9;
}
.mark-text {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  text-align: center;
}
.mark-name {
  font-family: var(--font-heading);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--white);
  line-height: 1.3;
}
.mark-description {
  font-family: var(--font-heading);
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.55;
}

.vp-desc {
  font-family: var(--font-heading);
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.6;
}
.playstyle-value strong {
  font-family: var(--font-heading);
  font-weight: 600;
  color: var(--white);
}

/* ── Playstyle ── */
.result-playstyle {
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}
.playstyle-row {
  display: flex;
  flex-direction: column;
  gap: 0.1rem;
}
.playstyle-label {
  font-family: var(--font-display);
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
.playstyle-value {
  font-family: var(--font-heading);
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.6;
}

/* ── Unified app footer ── */
.app-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  padding: 0.75rem 2rem;
  gap: 1.5rem;
  background: transparent;
  transition: background 400ms ease;
  pointer-events: none; /* pass-through on non-result pages */
}
.app-footer.result-active {
  background: rgba(4,2,1,0.90);
  border-top: 1px solid rgba(255,255,255,0.10);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
/* Buer logo always clickable */
.footer-buer-logo { pointer-events: auto; }

/* CTA center: hidden until result page */
.footer-cta {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 400ms ease;
}
.app-footer.result-active .footer-cta {
  opacity: 1;
  pointer-events: auto;
}
.footer-cta .btn-primary {
  width: 100%;
  max-width: 380px;
  min-height: 44px;
  font-size: 0.85rem;
  letter-spacing: 0.14em;
  white-space: nowrap; /* never wrap — "Get The Wretched Survivors" must stay on one line */
}
.footer-buer-logo {
  height: 80px;
  width: auto;
  opacity: 0.6;
  flex-shrink: 0;
  display: block;
  transition: opacity 200ms;
  filter: brightness(1.4);
}
.footer-buer-logo:hover { opacity: 0.9; }
.btn-restart-link {
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--font-display);
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  transition: color 150ms;
}
.btn-restart-link:hover { color: var(--white); }

/* ─── Audio widget ──────────────────────────────────────────────── */
.audio-widget {
  position: fixed;
  top: 1.25rem;
  left: 2rem;
  z-index: 25; /* above footer */
  display: flex;
  align-items: center;
  pointer-events: auto;
}

/* Expanded panel — drops DOWN from the top-left button */
.audio-expanded {
  position: absolute;
  top: calc(100% + 0.5rem);
  left: 0;
  background: rgba(10,6,4,0.88);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 10px;
  padding: 0.6rem 0.75rem 0.55rem;
  backdrop-filter: blur(8px);
  width: 200px;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  opacity: 0;
  pointer-events: none;
  transform: translateY(6px);
  transition: opacity 180ms ease, transform 180ms ease;
}
.audio-widget:hover .audio-expanded {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

/* Play + Mute row */
.audio-controls-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.audio-ctrl-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: color 150ms, background 150ms;
  flex-shrink: 0;
}
.audio-ctrl-btn:hover {
  color: var(--white);
  background: rgba(255,255,255,0.13);
}
.audio-ctrl-btn:focus-visible {
  outline: 2px solid var(--red);
  outline-offset: 2px;
}

/* Scrubber */
.scrubber-times {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-display);
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.45);
}
.scrubber-track {
  position: relative;
  height: 3px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  cursor: pointer;
}
.scrubber-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--red);
  border-radius: 2px;
  width: 0%;
  pointer-events: none;
}
.scrubber-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  background: var(--white);
  border-radius: 50%;
  left: 0%;
  pointer-events: none;
  transition: transform 100ms;
}
.scrubber-track:hover .scrubber-thumb {
  transform: translate(-50%, -50%) scale(1.3);
}

/* Main circular button */
.audio-main-btn {
  background: rgba(10,6,4,0.72);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 50%;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.55);
  cursor: pointer;
  transition: color 150ms, background 150ms, border-color 150ms;
  backdrop-filter: blur(6px);
}
.audio-main-btn:hover {
  color: var(--white);
  background: rgba(20,10,6,0.88);
  border-color: rgba(255,255,255,0.3);
}
.audio-main-btn:focus-visible {
  outline: 2px solid var(--red);
  outline-offset: 3px;
}

/* Loading spinner inside main button */
.audio-spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: rgba(255,255,255,0.65);
  border-radius: 50%;
  animation: audioSpin 0.75s linear infinite;
}
@keyframes audioSpin {
  to { transform: rotate(360deg); }
}


.doom-logo-corner {
  flex-shrink: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 400ms ease;
}
.doom-logo-corner.visible { opacity: 0.75; }
.doom-logo-corner img {
  height: 56px; /* footer-appropriate size */
  width: auto;
  display: block;
}

/* ─── Responsive ────────────────────────────────────────────────── */


@media (max-width: 600px) {
  html, body { font-size: 16px; }
  .quiz-section { padding: 1.5rem 1.1rem; }
  .result-scroll-inner { padding: 5rem 1.1rem 6.5rem; } /* top clears doom logo; bottom clears footer */
  .app-footer { padding: 0.55rem 1.25rem; gap: 0.75rem; }
  .footer-buer-logo { display: none; } /* too cramped at 390px — hide to give CTA room */
  .doom-logo-corner img { height: 40px; } /* smaller in mobile footer */
  .result-wrapper { gap: 0.8rem; }
  /* Audio widget top-left — match mobile padding */
  .audio-widget { top: 1rem; left: 1.1rem; }
  /* Back button: below audio widget */
  .btn-back { top: 4rem; left: 1.1rem; }
  .result-rep-wrap { width: 90px; height: 90px; }
  .result-bottom-row { grid-template-columns: 1fr; }

  /* Stack ability + warriors vertically on mobile — all must be explicitly full-width */
  .result-main-row { flex-direction: column; flex: none; width: 100%; }
  .result-ability-card { flex: none; width: 100%; }
  .result-warriors-section { flex: none; width: 100%; }

  /* Warriors: fixed height image strip on small screens */
  .warrior-mini-card { flex: none; height: 110px; }
  /* Scale text down — 3 cards share ~355px on a 390px phone */
  .warrior-row-title { font-size: 0.75rem; }
  .warrior-row-desc  { font-size: 0.6rem; line-height: 1.4; }
  .warrior-card-text { padding: 0.25rem 0.2rem 0.4rem; gap: 0.1rem; }

}

/* ─── Desktop: full-width stacked layout ───────────────────────── */
@media (min-width: 900px) {
  /* Allow natural scroll on desktop — scroll-inner handles it, not the section */
  .result-scroll-inner {
    align-items: center;
    padding: 2rem 2rem 7rem; /* bottom clears the fixed footer */
  }
  .result-wrapper {
    gap: 1rem;
  }

  /* Unstack the main row — each section goes full width */
  .result-main-row {
    flex-direction: column;
    flex: none;
    gap: 1rem;
  }
  .result-ability-card {
    flex: none;
    width: 100%;
  }

  /* Ability body: horizontal row on wide screen (logo left, text right) */
  .result-ability-body {
    flex-direction: row !important;
    align-items: center;
    justify-content: flex-start;
    text-align: left;
    gap: 1.25rem;
  }
  .mark-text { text-align: left; }

  /* Warriors full width, taller minis */
  .result-warriors-section {
    flex: none;
    width: 100%;
  }
  .result-warriors-section .warrior-list {
    flex: none;
    padding: 1rem 0 0;
  }
  .warrior-mini-card {
    flex: none;
    height: 200px;
  }

  /* Bottom row: side-by-side (already the default, keep it) */
  .result-bottom-row { gap: 1rem; }
  /* Bottom row: adjust gap */
  .result-cta-bottom { gap: 1rem; }
}
</style>
</head>

// ── BG ART CROSSFADE ──────────────────────────────────────────────

let bgSlot = 'a';

function setBgArt(src) {
  const next = bgSlot === 'a' ? 'b' : 'a';
  const nextEl = document.getElementById(`bg-art-${next}`);
  const curEl  = document.getElementById(`bg-art-${bgSlot}`);
  nextEl.style.backgroundImage = `url("${src}")`;
  nextEl.classList.add('active');
  curEl.classList.remove('active');
  bgSlot = next;
}

function clearBgArt() {
  document.getElementById('bg-art-a').classList.remove('active');
  document.getElementById('bg-art-b').classList.remove('active');
}

// ── STATE ─────────────────────────────────────────────────────────

const state = { currentQuestion: 0, scores: {} };
const answerHistory = [];

function resetScores() { COMPANIES.forEach(c => { state.scores[c.id] = 0; }); }

// ── UTILS ─────────────────────────────────────────────────────────

function transitionTo(sectionId) {
  document.querySelectorAll('.quiz-section').forEach(s => s.classList.remove('active'));
  document.getElementById(sectionId).classList.add('active');
  const fog = document.querySelector('.fog-bottom');
  fog.classList.remove('fog-hero', 'fog-quiz', 'fog-result');
  if (sectionId === 'section-hero')        fog.classList.add('fog-hero');
  else if (sectionId === 'section-quiz')   fog.classList.add('fog-quiz');
  else if (sectionId === 'section-result') fog.classList.add('fog-result');
  document.querySelector('.bg-cover').classList.toggle('bg-cover-result', sectionId === 'section-result');
  document.getElementById('doom-logo-corner').classList.toggle('visible', sectionId !== 'section-hero');
  document.getElementById('app-footer').classList.toggle('result-active', sectionId === 'section-result');
}

function updateProgress(index) {
  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.remove('completed', 'current');
    if (i < index) dot.classList.add('completed');
    else if (i === index) dot.classList.add('current');
  });
  document.getElementById('q-num').textContent = index + 1;
  document.getElementById('btn-back').classList.add('visible'); /* always visible in quiz */
}

function getWinner() {
  let max = -1, winner = null;
  for (const company of COMPANIES) {
    if (state.scores[company.id] > max) {
      max = state.scores[company.id];
      winner = company;
    }
  }
  return winner;
}

// ── QUIZ LOGIC ────────────────────────────────────────────────────

function startQuiz() {
  state.currentQuestion = 0;
  answerHistory.length = 0;
  resetScores();
  transitionTo('section-quiz');
  showQuestion(0);
}

function showQuestion(index) {
  const container = document.getElementById('question-container');
  updateProgress(index);

  setBgArt(QUESTIONS[index].art);

  // Fade question content out, swap, fade in
  container.classList.add('fading');
  setTimeout(() => {
    const q = QUESTIONS[index];
    document.getElementById('question-text').textContent = q.text;

    const list = document.getElementById('answers-list');
    list.innerHTML = '';
    q.answers.forEach(answer => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = answer.text;
      btn.addEventListener('click', () => handleAnswer(answer));
      list.appendChild(btn);
    });

    container.classList.remove('fading');
  }, 200);
}

function handleAnswer(answer) {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
  answerHistory.push({ questionIndex: state.currentQuestion, answer });
  for (const [id, pts] of Object.entries(answer.scores)) {
    state.scores[id] = (state.scores[id] || 0) + pts;
  }
  state.currentQuestion++;
  if (state.currentQuestion < QUESTIONS.length) {
    showQuestion(state.currentQuestion);
  } else {
    setTimeout(showResult, 220);
  }
}

function goBack() {
  if (answerHistory.length === 0) {
    // On Q1 — back goes to the splash/hero page
    resetQuiz();
    return;
  }
  const last = answerHistory.pop();
  for (const [id, pts] of Object.entries(last.answer.scores)) {
    state.scores[id] -= pts;
  }
  state.currentQuestion = last.questionIndex;
  showQuestion(state.currentQuestion);
}

function showResult() {
  const winner = getWinner();
  if (!winner) return;

  clearBgArt();
  document.documentElement.style.setProperty('--company-accent', winner.accent);
  document.documentElement.style.setProperty('--company-accent-rgb', winner.accentRgb);

  // Short name for CTA (strip "The ")
  const shortName = winner.name.replace(/^The /, '');

  document.getElementById('result-name').textContent = winner.name;
  document.getElementById('result-link-2').textContent = `Get The ${shortName}`;
  document.getElementById('result-tagline').textContent = winner.tagline;
  document.getElementById('mark-name').textContent = winner.markName;
  document.getElementById('mark-description').textContent = winner.markDescription;
  const markLogo = document.getElementById('mark-logo');
  markLogo.src = winner.rep;
  markLogo.alt = winner.name;
  document.getElementById('result-strategy').textContent = winner.strategy;
  document.getElementById('result-victory').innerHTML = winner.victoryPath;
  document.getElementById('result-link-2').href = winner.url;

  const minisEl = document.getElementById('warrior-minis');
  minisEl.innerHTML = '';
  const warriorEntries = winner.warriors.split(' · ');
  winner.minis.forEach((src, i) => {
    const raw = warriorEntries[i] || '';
    const match = raw.match(/^(.+?)\s*\((.+)\)$/);
    const name = match ? match[1] : raw;
    const desc = match ? match[2] : '';
    const card = document.createElement('div');
    card.className = 'warrior-card';
    const towerStyles = [
      'background-image:url(Art/Bonus%20Art/Battlefield.png); background-position:20% 40%; background-size:cover;',
      'background-image:url(Art/Bonus%20Art/Battlefield.png); background-position:center 40%; background-size:cover;',
      'background-image:url(Art/Bonus%20Art/Battlefield.png); background-position:80% 40%; background-size:cover;',
    ];
    const tStyle = towerStyles[i % towerStyles.length];
    card.innerHTML = `
      <div class="warrior-mini-card">
        <div class="card-tower" style="${tStyle}"></div>
        <div class="card-dark"></div>
        <div class="card-fog-1"></div>
        <div class="card-fog-2"></div>
        <img src="${src}" alt="${name}">
      </div>
      <div class="warrior-card-text">
        <span class="warrior-row-title">${name}</span>
        <span class="warrior-row-desc">${desc}</span>
      </div>`;
    minisEl.appendChild(card);
  });

  // CSS variable consumed by mobile media query only — desktop layout unaffected
  minisEl.style.setProperty('--warrior-panel-bg', 'url(Art/Bonus%20Art/Battlefield.png)');

  transitionTo('section-result');
  document.getElementById('result-scroll-inner').scrollTop = 0;
}

function resetQuiz() {
  state.currentQuestion = 0;
  answerHistory.length = 0;
  resetScores();
  clearBgArt();
  document.documentElement.style.setProperty('--company-accent', '#be4127');
  document.documentElement.style.setProperty('--company-accent-rgb', '190,65,39');
  transitionTo('section-hero');
}

// ── PRELOAD IMAGES ────────────────────────────────────────────────

function preload() {
  [...QUESTIONS.map(q => q.art), ...COMPANIES.map(c => c.rep)].forEach(src => {
    new Image().src = src;
  });
}

document.getElementById('btn-start').addEventListener('click', startQuiz);

});
document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-restart').addEventListener('click', resetQuiz);
resetScores();
preload();

// ── Audio widget (Howler.js) ──────────────────────────────────────
const btnAudioMain  = document.getElementById('btn-audio-main');
const btnPlayPause  = document.getElementById('btn-play-pause');
const btnMute       = document.getElementById('btn-mute');
const audioSpinner  = document.getElementById('audio-spinner');
const iconMainPlay  = document.getElementById('icon-main-play');
const iconMainPause = document.getElementById('icon-main-pause');
const iconPpPlay    = document.getElementById('icon-pp-play');
const iconPpPause   = document.getElementById('icon-pp-pause');
const iconSound     = document.getElementById('icon-sound');
const iconMute      = document.getElementById('icon-mute');
const scrubTrack    = document.getElementById('scrubber-track');
const scrubFill     = document.getElementById('scrubber-fill');
const scrubThumb    = document.getElementById('scrubber-thumb');
const scrubCurrent  = document.getElementById('scrubber-current');
const scrubTotal    = document.getElementById('scrubber-total');

let audioReady = false;
let isMuted    = false;
let scrubRaf   = null;

function setMainState(state) {
  audioSpinner.style.display  = state === 'loading' ? '' : 'none';
  iconMainPlay.style.display  = state === 'paused'  ? '' : 'none';
  iconMainPause.style.display = state === 'playing' ? '' : 'none';
}

function setPpState(playing) {
  iconPpPlay.style.display  = playing ? 'none' : '';
  iconPpPause.style.display = playing ? ''     : 'none';
}

function fmtTime(s) {
  if (!isFinite(s) || isNaN(s)) return '0:00';
  const m   = Math.floor(s / 60);
  const sec = String(Math.floor(s % 60)).padStart(2, '0');
  return `${m}:${sec}`;
}

function startScrubLoop() {
  function tick() {
    const pos = typeof howl.seek() === 'number' ? howl.seek() : 0;
    const dur = howl.duration() || 0;
    if (dur > 0) {
      const pct = (pos / dur) * 100;
      scrubFill.style.width    = pct + '%';
      scrubThumb.style.left    = pct + '%';
      scrubCurrent.textContent = fmtTime(pos);
    }
    scrubRaf = requestAnimationFrame(tick);
  }
  cancelAnimationFrame(scrubRaf);
  scrubRaf = requestAnimationFrame(tick);
}

function stopScrubLoop() {
  cancelAnimationFrame(scrubRaf);
}

// Start spinner immediately
setMainState('loading');

const howl = new Howl({
  src:      ['music/track.mp3'],
  loop:     true,
  autoplay: true,
  volume:   0.45,
  html5:    true,   // required for iOS background playback + streaming

  onload: function() {
    audioReady = true;
    scrubTotal.textContent = fmtTime(howl.duration());
    // If autoplay was blocked, onplay won't have fired — show play button
    if (!howl.playing()) setMainState('paused');
  },

  onloaderror: function() {
    // File missing or codec error — hide widget silently
    document.getElementById('audio-widget').style.display = 'none';
  },

  onplay: function() {
    audioReady = true;
    setMainState('playing');
    setPpState(true);
    btnAudioMain.setAttribute('aria-label', 'Pause music');
    btnPlayPause.setAttribute('aria-label', 'Pause music');
    if (howl.duration()) scrubTotal.textContent = fmtTime(howl.duration());
    startScrubLoop();
  },

  onpause: function() {
    setMainState('paused');
    setPpState(false);
    btnAudioMain.setAttribute('aria-label', 'Play music');
    btnPlayPause.setAttribute('aria-label', 'Play music');
    stopScrubLoop();
  },

  onplayerror: function() {
    // Autoplay blocked by browser — show play button, retry on Howler unlock
    if (audioReady) setMainState('paused');
    howl.once('unlock', function() { howl.play(); });
  },
});

btnAudioMain.addEventListener('click', () => {
  if (!audioReady) return;
  howl.playing() ? howl.pause() : howl.play();
});

btnPlayPause.addEventListener('click', () => {
  if (!audioReady) return;
  howl.playing() ? howl.pause() : howl.play();
});

btnMute.addEventListener('click', () => {
  isMuted = !isMuted;
  howl.mute(isMuted);
  iconSound.style.display = isMuted ? 'none' : '';
  iconMute.style.display  = isMuted ? ''     : 'none';
});

// Scrubber — click or drag to seek
function seekTo(e) {
  if (!audioReady) return;
  const rect = scrubTrack.getBoundingClientRect();
  const pct  = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
  const dur  = howl.duration();
  if (dur) howl.seek(pct * dur);
}
let dragging = false;
scrubTrack.addEventListener('mousedown', e => { dragging = true; seekTo(e); });
document.addEventListener('mousemove',  e => { if (dragging) seekTo(e); });
document.addEventListener('mouseup',    () => { dragging = false; });
</script>
